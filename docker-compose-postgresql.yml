services:
  kafka:
    image: quay.io/debezium/kafka:3.5
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: hiepnh
      NODE_ID: 1
      NODE_ROLE: combined
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    networks:
      - debezium-net

  postgres:
    image: quay.io/debezium/example-postgres:3.5
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
    networks:
      - debezium-net

  connect:
    image: quay.io/debezium/connect:3.5
    container_name: connect
    hostname: connect
    ports:
      - "8083:8083"
    environment:
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
      - postgres
    networks:
      - debezium-net

  watcher:
    image: quay.io/debezium/kafka:3.5
    container_name: watcher
    hostname: watcher
    command: ["watch-topic", "-a", "-k", "fulfillment.public.inventory"]
    depends_on:
      - kafka
    networks:
      - debezium-net

networks:
  debezium-net:
    driver: bridge
